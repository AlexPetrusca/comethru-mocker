
services:
  mocker-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: comethru-mocker
    ports:
      - "8090:8090"
    volumes:
      - mocker-data:/app/data
    environment:
      - SERVER_PORT=8090
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mocker-data:
